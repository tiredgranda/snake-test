<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Great Place To Work — Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #11131C;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #brand-header {
      color: #FF1628;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #game-wrapper {
      position: relative;
      border: 2px solid #FF1628;
      border-radius: 6px;
      overflow: hidden;
    }

    canvas {
      display: block;
      background-color: #11131C;
    }

    #hud {
      background-color: #32383F;
      border-top: 2px solid #FF1628;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 48px;
    }

    .hud-item {
      color: #DEE5E4;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .hud-item span {
      color: #FFFFFF;
    }

    #hud-brand {
      color: #FF1628;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1.5px;
    }

    /* Overlay */
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(17, 19, 28, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 10;
    }

    #overlay h1 {
      color: #FFFFFF;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    #overlay h2 {
      color: #FF1628;
      font-size: 22px;
      font-weight: bold;
    }

    #overlay p {
      color: #DEE5E4;
      font-size: 14px;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    #overlay .divider {
      width: 48px;
      height: 4px;
      background: #FF1628;
      border-radius: 2px;
      margin: 6px 0;
    }

    #overlay button {
      margin-top: 16px;
      padding: 12px 36px;
      background-color: #FF1628;
      color: #FFFFFF;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: background 0.2s;
    }

    #overlay button:hover {
      background-color: #cc0f1e;
    }
  </style>
</head>
<body>

  <div id="brand-header">Great Place To Work®</div>

  <div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <div class="hud-item">SCORE &nbsp;<span id="score-val">0</span></div>
      <div id="hud-brand">Great Place To Work®</div>
      <div class="hud-item">BEST &nbsp;<span id="best-val">0</span></div>
    </div>

    <!-- Overlay (start / game over) -->
    <div id="overlay">
      <h1>Great Place To Work®</h1>
      <div class="divider"></div>
      <h2>🐍 Snake</h2>
      <p>Use Arrow Keys to move</p>
      <button id="overlay-btn">PLAY</button>
    </div>
  </div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────
    const CELL   = 20;
    const COLS   = 30;
    const ROWS   = 25;
    const FPS    = 10;

    // ── Brand Colors ────────────────────────────────────────────────────────
    const C = {
      black  : "#11131C",
      red    : "#FF1628",
      white  : "#FFFFFF",
      gray3  : "#DEE5E4",
      gray7  : "#69737A",
      gray10 : "#32383F",
    };

    // ── Canvas Setup ────────────────────────────────────────────────────────
    const canvas = document.getElementById("gameCanvas");
    canvas.width  = COLS * CELL;
    canvas.height = ROWS * CELL;
    const ctx = canvas.getContext("2d");

    // ── State ───────────────────────────────────────────────────────────────
    let snake, dir, nextDir, food, score, highScore = 0, loop;

    const DIR = {
      UP    : { x:  0, y: -1 },
      DOWN  : { x:  0, y:  1 },
      LEFT  : { x: -1, y:  0 },
      RIGHT : { x:  1, y:  0 },
    };

    // ── Helpers ─────────────────────────────────────────────────────────────
    function spawnFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS),
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      return pos;
    }

    function newGame() {
      snake   = [{ x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) }];
      dir     = DIR.RIGHT;
      nextDir = DIR.RIGHT;
      score   = 0;
      food    = spawnFood();
      updateHUD();
    }

    function updateHUD() {
      document.getElementById("score-val").textContent = score;
      document.getElementById("best-val").textContent  = highScore;
    }

    // ── Draw ─────────────────────────────────────────────────────────────────
    function roundRect(x, y, w, h, r, fill) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
    }

    function drawGrid() {
      ctx.strokeStyle = C.gray10;
      ctx.lineWidth   = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL, 0);
        ctx.lineTo(x * CELL, ROWS * CELL);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * CELL);
        ctx.lineTo(COLS * CELL, y * CELL);
        ctx.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((seg, i) => {
        const px = seg.x * CELL;
        const py = seg.y * CELL;
        if (i === 0) {
          // Head — white shell
          roundRect(px + 1, py + 1, CELL - 2, CELL - 2, 5, C.white);
          // Red inner dot
          roundRect(px + 5, py + 5, CELL - 10, CELL - 10, 3, C.red);
        } else {
          roundRect(px + 1, py + 1, CELL - 2, CELL - 2, 5, C.gray7);
        }
      });
    }

    function drawFood() {
      const px = food.x * CELL;
      const py = food.y * CELL;
      // Red circle pellet
      ctx.beginPath();
      ctx.arc(px + CELL / 2, py + CELL / 2, CELL / 2 - 3, 0, Math.PI * 2);
      ctx.fillStyle = C.red;
      ctx.fill();
      // Shine
      ctx.beginPath();
      ctx.arc(px + 7, py + 7, 2, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = C.black;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawFood();
      drawSnake();
    }

    // ── Update ───────────────────────────────────────────────────────────────
    function update() {
      dir = nextDir;
      const head    = snake[0];
      const newHead = { x: head.x + dir.x, y: head.y + dir.y };

      // Collision check
      const hitWall = newHead.x < 0 || newHead.x >= COLS ||
                      newHead.y < 0 || newHead.y >= ROWS;
      const hitSelf = snake.some(s => s.x === newHead.x && s.y === newHead.y);

      if (hitWall || hitSelf) {
        clearInterval(loop);
        highScore = Math.max(highScore, score);
        updateHUD();
        showOverlay("Game Over", `Score: ${score}`, "PLAY AGAIN");
        return;
      }

      snake.unshift(newHead);

      if (newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        food = spawnFood();
        updateHUD();
      } else {
        snake.pop();
      }

      draw();
    }

    // ── Overlay ──────────────────────────────────────────────────────────────
    function showOverlay(title, subtitle, btnLabel) {
      const ov  = document.getElementById("overlay");
      ov.innerHTML = `
        <h1>${title}</h1>
        <div class="divider"></div>
        <h2>${subtitle}</h2>
        <p>Use Arrow Keys to move</p>
        <button id="overlay-btn">${btnLabel}</button>
      `;
      ov.style.display = "flex";
      document.getElementById("overlay-btn")
               .addEventListener("click", startGame);
    }

    // ── Start ────────────────────────────────────────────────────────────────
    function startGame() {
      document.getElementById("overlay").style.display = "none";
      newGame();
      draw();
      loop = setInterval(update, 1000 / FPS);
    }

    // ── Controls ─────────────────────────────────────────────────────────────
    document.addEventListener("keydown", e => {
      switch (e.key) {
        case "ArrowUp":
          if (dir !== DIR.DOWN)  nextDir = DIR.UP;    break;
        case "ArrowDown":
          if (dir !== DIR.UP)    nextDir = DIR.DOWN;  break;
        case "ArrowLeft":
          if (dir !== DIR.RIGHT) nextDir = DIR.LEFT;  break;
        case "ArrowRight":
          if (dir !== DIR.LEFT)  nextDir = DIR.RIGHT; break;
      }
      e.preventDefault();
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    document.getElementById("overlay-btn")
            .addEventListener("click", startGame);
  </script>
</body>
</html>
